name: Plugin Scan

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  security-events: write

jobs:
  scan:
    name: HOL plugin quality gate
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Scan plugin
        id: scan
        uses: hashgraph-online/ai-plugin-scanner-action@fd0069e694bbb4852e4ba539fd61dd1420623a56
        with:
          plugin_dir: "."
          format: "sarif"
          output: "ai-plugin-scanner.sarif"
          profile: "public-marketplace"
          min_score: "80"
          fail_on_severity: "high"
          upload_sarif: "true"
          registry_payload_output: "ai-plugin-registry-payload.json"
